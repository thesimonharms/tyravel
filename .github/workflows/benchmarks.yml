name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run benchmarks (quick mode)
        run: BENCHMARK_QUICK=1 node scripts/benchmark.mjs --json > benchmark-report.json

      - name: Print summary
        run: node scripts/benchmark-summary.mjs benchmark-report.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-${{ github.sha }}
          path: benchmark-report.json
          retention-days: 90