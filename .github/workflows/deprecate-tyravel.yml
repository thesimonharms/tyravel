name: Deprecate legacy Tyravel packages

on:
  workflow_dispatch:

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      # Deprecate requires a granular token with "Bypass two-factor authentication"
      # and read-write on @tyravel/* — passkeys cannot authorize scripted npm commands.
      - name: Deprecate @tyravel/* on npm
        run: node scripts/deprecate-tyravel.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}