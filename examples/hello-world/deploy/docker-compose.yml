services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_URL: http://localhost:3000
      APP_DEBUG: "false"
      PONDOKNUSA_HOST: 0.0.0.0
      PONDOKNUSA_PORT: "3000"
      DB_CONNECTION: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: pondoknusa
      DB_USERNAME: pondoknusa
      DB_PASSWORD: pondoknusa
      QUEUE_CONNECTION: database
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: npx pondoknusa queue:work
    environment:
      NODE_ENV: production
      DB_CONNECTION: postgres
      DB_HOST: postgres
      DB_DATABASE: pondoknusa
      DB_USERNAME: pondoknusa
      DB_PASSWORD: pondoknusa
      QUEUE_CONNECTION: database
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pondoknusa
      POSTGRES_USER: pondoknusa
      POSTGRES_PASSWORD: pondoknusa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pondoknusa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: